name: Java CI with Custom HTML Dashboard

on:
  push:
    branches: [ "main" ]

# Cấp quyền cho GitHub Actions để deploy lên GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrently:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Build, Test and Generate HTML
      run: |
        cd calculator-app
        mvn clean test > build_log.txt || true
        
        cat <<EOF > index.html
        <!DOCTYPE html>
        <html>
        <head><title>Báo cáo</title></head>
        <body>
          <h1>Demo CI/CD</h1>
          <p>Tên: abc, Tuổi: 20</p>
        </body>
        </html>
        EOF

    # Thay vì upload artifact thông thường, ta dùng upload-pages-artifact
    - name: Upload Pages Artifact
      if: always()
      uses: actions/upload-pages-artifact@v3
      with:
        path: calculator-app/ # Đường dẫn tới thư mục chứa file index.html

  # Thêm một job để đẩy lên mạng
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4