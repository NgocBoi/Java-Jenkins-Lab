name: Java CI with Custom HTML Dashboard

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Bước chạy test và tự động tạo file index.html từ script
    - name: Build, Test and Generate HTML
      run: |
        cd calculator-app
        mvn clean test > build_log.txt || true # Chạy test và lưu log (|| true để nếu test fail vẫn chạy tiếp bước dưới)
        
        # Đoạn Script tự động tạo file index.html
        cat <<EOF > index.html
        <!DOCTYPE html>
        <html>
        <head><title>Báo cáo</title></head>
        <body>
          <h1>🚀 Kết Quả Quy Trình CI/CD</h1>
          <p>Tên: abc, Tuổi: 20</p>
          <hr>
          <h3>Log hiển thị:</h3>
          <pre>$(tail -n 20 build_log.txt)</pre>
        </body>
        </html>
        EOF

    # BƯỚC LẤY FILE: Đẩy file index.html lên mục Artifacts của GitHub
    - name: Upload Custom Dashboard HTML
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: trang-giao-dien-custom
        path: calculator-app/index.html