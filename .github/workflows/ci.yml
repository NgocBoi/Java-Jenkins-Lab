name: Java CI with Maven

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    # Chạy lệnh sinh báo cáo HTML kèm theo lệnh test
    - name: Build and Test with Maven
      run: |
        cd calculator-app
        mvn clean test surefire-report:report
        mvn exec:java -Dexec.mainClass="com.calculator.App"

    # BƯỚC NÂNG CẤP: Đưa thư mục chứa file HTML lên GitHub Artifacts
    - name: Upload Test Report HTML
      if: always() # Luôn luôn chạy bước này kể cả khi test bị lỗi (failed)
      uses: actions/upload-artifact@v4
      with:
        name: maven-test-report-html # Tên của file zip khi tải về
        path: calculator-app/target/site/ # Đường dẫn tới thư mục chứa file HTML