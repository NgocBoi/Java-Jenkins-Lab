<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thông tin cá nhân</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .profile-card {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            width: 300px;
        }
        h1 {
            color: #1a73e8;
            margin-bottom: 20px;
            font-size: 24px;
        }
        .info {
            font-size: 18px;
            color: #3c4043;
            margin: 10px 0;
            text-align: left;
            padding-left: 20px;
        }
        .info strong {
            color: #202124;
        }
    </style>
</head>
<body>

    <div class="profile-card">
        <h1>Thông tin cá nhân</h1>
        <div class="info"><strong>Tên:</strong> abc</div>
        <div class="info"><strong>Tuổi:</strong> 20</div>
    </div>
</body>
</html>
